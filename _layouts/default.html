<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        
        {% if site.logo %}
          <img src="{{site.logo | relative_url}}" alt="Logo" />
        {% endif %}
        
        <p>{{ site.description | default: site.github.project_tagline }}</p>
        
        {% if site.github.is_user_page %}
        <p class="view">
          <a href="https://trinhudo.github.io">Resume</a> 
          <br>
          <a href="https://trinhudo.github.io/research.html">Research</a> 
          <br>
          <a href="https://trinhudo.github.io/publications.html">Publications</a> 
          <br>
          <a href="{{ site.github.owner_url }}">Codes on GitHub</a>
          <br>
          <a href="https://scholar.google.com/citations?user=cwdP-oYAAAAJ&hl=en">Google Scholar</a>
          <br>
          <a href="https://www.trinhu.com/">trinhu.com</a>
        </p>
        {% endif %}

      </header>
      <section>
        
      <span style="color:black">
        
      {{ content }}
        
      </span>
      
      </section>
      <footer>
        <p><small>Montreal, QC, 2022</small></p>
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
